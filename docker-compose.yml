version: "3.9"

services:
  backend:
    build: ./apps/backend
    container_name: backend_service
    ports:
      - "4000:4000"
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  frontend:
    build: ./apps/frontend
    container_name: frontend_service
    ports:
      - "5173:5173"
    env_file:
      - ./apps/frontend/.env
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules