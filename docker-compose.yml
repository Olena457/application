version: "3.9"

services:
  backend:
    build: 
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend_service
    ports:
      - "4000:4000"
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    restart: always

  frontend:
    build: 
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend_service
    ports:
      - "5173:5173"
    env_file:
      - ./apps/frontend/.env
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always